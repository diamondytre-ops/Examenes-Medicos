<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica - Sistema Médico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-hospital-user"></i>
                <h3 style="margin: 0; color: var(--text-color);">MediSys</h3>
            </div>
            <ul class="nav-links">
                <li><a href="inicio.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li id="linkDr"><a href="pagDr.html"><i class="fas fa-user-md"></i> Panel Doctor</a></li>
                <li><a href="historial.html"><i class="fas fa-database"></i> Base de Datos</a></li>
                <li id="linkEnf"><a href="pagEnf.html"><i class="fas fa-user-nurse"></i> Panel Enfermería</a></li>
                <li><a href="agendar.html" class="active"><i class="fas fa-calendar-alt"></i> Agendar Citas</a></li>
                <li style="margin-top: auto;"><a href="#" onclick="logout()" style="color: var(--danger);"><i
                            class="fas fa-sign-out-alt" style="color: var(--danger);"></i> Cerrar Sesión</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h1>Gestión de Citas Médicas</h1>
                    <p style="color: #666;">Agenda y Programación de Pacientes</p>
                </div>
                <button onclick="generarPDFCitasGlobal()" class="btn btn-primary">
                    <i class="fas fa-print"></i> Imprimir Agenda (PDF)
                </button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr; gap: 2rem;">

                <!-- Formulario Agendar -->
                <div class="card">
                    <h2><i class="fas fa-calendar-plus"></i> Nueva Cita</h2>
                    <form id="formCita">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>Nombre del Paciente</label>
                                <input type="text" id="nombreCita" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Motivo de Consulta</label>
                                <input type="text" id="motivoCita" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Fecha de la Cita</label>
                                <input type="date" id="fechaCita" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Hora Programada</label>
                                <input type="time" id="horaCita" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                            <i class="fas fa-save"></i> Agendar Cita
                        </button>
                    </form>
                </div>

                <!-- Lista de Citas -->
                <div class="card">
                    <h2><i class="fas fa-list"></i> Citas Programadas</h2>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Hora</th>
                                    <th>Paciente</th>
                                    <th>Motivo</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCitas">
                                <!-- Se llena con JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
