<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Médico</title>
    <!-- Estilos -->
    <link rel="stylesheet" href="style.css">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-body">

    <div class="login-card">
        <i class="fas fa-heartbeat"></i>
        <h2>Expedientes Médicos</h2>
        <p style="color: #666; margin-bottom: 2rem;">Ingresa tus credenciales para acceder</p>

        <form id="loginForm">
            <div class="form-group text-left">
                <label for="usuario">Usuario</label>
                <div style="position: relative;">
                    <i class="fas fa-user"
                        style="position: absolute; left: 15px; top: 15px; color: var(--secondary-color); font-size: 1rem; margin: 0;"></i>
                    <input type="text" id="usuario" class="form-control" placeholder="Ej: doctor / enfermera" required
                        style="padding-left: 45px;">
                </div>
            </div>

            <div class="form-group text-left">
                <label for="password">Contraseña</label>
                <div style="position: relative;">
                    <i class="fas fa-lock"
                        style="position: absolute; left: 15px; top: 15px; color: var(--secondary-color); font-size: 1rem; margin: 0;"></i>
                    <input type="password" id="password" class="form-control" placeholder="Ej: 123" required
                        style="padding-left: 45px;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                Ingresar <i class="fas fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <!-- Script de lógica -->
    <script src="script.js"></script>
</body>

</html>
